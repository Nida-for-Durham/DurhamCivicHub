name: Update Civic Data

on:
  schedule:
    # Daily at 7:00 AM UTC (3 AM Eastern)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update civic data files
        run: python scripts/update_civic_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update civic data $(date +%Y-%m-%d)"
          git push
