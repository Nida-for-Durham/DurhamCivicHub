name: Daily Data Fetch

on:
  schedule:
    - cron: '0 12 * * *'   # Daily 7:00 AM ET (noon UTC)
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ── Fetch news from Durham RSS feeds ──────────────────────────
      # Exit 0 = auto-merge (<10 new stories)
      # Exit 2 = HOLD (10+ new stories — review before merge, but file is written)
      # Exit 1 = BLOCK (all stories vanished — scraper failure, file not updated)
      - name: Fetch news
        id: fetch_news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          python scripts/fetch_news.py
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          if [ $EXIT -eq 1 ]; then
            echo "::error::fetch_news.py BLOCK: all stories disappeared — possible scraper failure"
            exit 1
          fi
          if [ $EXIT -eq 2 ]; then
            echo "::warning::fetch_news.py HOLD: 10+ new stories — review news.json before next deploy"
          fi
          exit 0

      # ── Update meetings, polling places, ward boundaries, legislators, budget
      - name: Update civic data
        run: python scripts/update_civic_data.py

      # ── Fetch NWS weather alerts for Durham County (zone NCC063) ──
      - name: Fetch weather alerts
        run: |
          python - <<'EOF'
          import json, datetime, requests
          from pathlib import Path

          ZONE = "NCC063"
          UA   = "DurhamCivicHub (nidaallam@nidaallam.com)"
          url  = f"https://api.weather.gov/alerts/active/zone/{ZONE}"
          out  = Path("data/alerts.json")

          try:
              r = requests.get(url, headers={"User-Agent": UA, "Accept": "application/geo+json"}, timeout=10)
              r.raise_for_status()
              features = r.json().get("features", [])
              alerts = [
                  {
                      "event":    f["properties"].get("event", "Weather Alert"),
                      "headline": f["properties"].get("headline", ""),
                      "url":      f["properties"].get("url") or f"https://alerts.weather.gov/search?zone={ZONE}",
                  }
                  for f in features
                  if f.get("properties", {}).get("status") == "Actual"
              ]
          except Exception as e:
              print(f"NWS fetch failed: {e}")
              try:
                  alerts = json.loads(out.read_text()).get("alerts", [])
              except Exception:
                  alerts = []

          payload = {
              "updated": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "alerts": alerts,
          }
          out.write_text(json.dumps(payload, indent=2))
          print(f"Wrote {len(alerts)} alert(s) to {out}")
          EOF

      # ── Check resource links (runs daily, skips if no broken links)
      - name: Check resource links
        run: python scripts/check_resources.py

      # ── Update meta.json timestamp ────────────────────────────────
      - name: Update meta timestamp
        run: |
          python - <<'EOF'
          import json, datetime
          from pathlib import Path

          today = datetime.date.today().isoformat()
          meta_path = Path("data/meta.json")
          try:
              meta = json.loads(meta_path.read_text())
          except Exception:
              meta = {"lastUpdated": today, "sources": {}}

          meta["lastUpdated"] = today
          for key in meta.get("sources", {}):
              meta["sources"][key] = today

          meta_path.write_text(json.dumps(meta, indent=2))
          print(f"Updated meta.json → {today}")
          EOF

      # ── Update changelog.json (Part 5.9) ─────────────────────────
      - name: Update changelog
        run: |
          python3 - <<'EOF'
          import json, datetime
          from pathlib import Path

          log_path = Path("data/changelog.json")
          try:
              log = json.loads(log_path.read_text())
          except Exception:
              log = {"lastRun": None, "runs": []}

          run = {"date": datetime.date.today().isoformat(), "workflow": "daily-fetch"}
          log["lastRun"] = run["date"]
          log["runs"] = ([run] + log.get("runs", []))[:30]  # keep last 30 runs
          log_path.write_text(json.dumps(log, indent=2))
          EOF

      # ── Commit all changed data files ─────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name "Nida Allam"
          git config user.email "nidaallam@nidaallam.com"
          git add data/ news.xml meetings.ics STATUS.md 2>/dev/null; true
          git diff --staged --quiet || git commit -m "data: daily fetch $(date +%Y-%m-%d)"
          git push

      # ── Auto-rollback: wait 10 min, check homepage returns 200 with expected text ─
      - name: Verify deploy health
        run: |
          echo "Waiting 10 minutes for GitHub Pages to deploy..."
          sleep 600
          HOMEPAGE="https://civichub.nidaallam.com/index.html"
          HTTP_CODE=$(curl -s -o /tmp/homepage.html -w "%{http_code}" "$HOMEPAGE")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Homepage returned HTTP $HTTP_CODE — rolling back"
            git revert --no-edit HEAD
            git push
            exit 1
          fi
          if ! grep -q "Durham Civic Hub" /tmp/homepage.html; then
            echo "::error::Homepage loaded but expected text not found — rolling back"
            git revert --no-edit HEAD
            git push
            exit 1
          fi
          echo "Deploy healthy — homepage returned 200 with expected content"
