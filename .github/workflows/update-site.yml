name: Update Site Data

on:
  schedule:
    # 7:00 AM Eastern — 11:00 UTC (EDT, Mar–Nov) / 12:00 UTC (EST, Nov–Mar)
    # Running both times ensures 7 AM year-round; duplicate commits are a no-op
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: # also allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and update news.json
        run: python scripts/fetch_news.py

      - name: Fetch and update meetings.json
        run: python scripts/fetch_meetings.py

      - name: Commit and push updated data files
        run: |
          git config user.name  "Nida Allam"
          git config user.email "nidaallam@nidaallam.com"
          git add data/news.json data/meetings.json
          git diff --cached --quiet || git commit -m "chore: auto-update site data $(date -u +'%Y-%m-%d')"
          git push
